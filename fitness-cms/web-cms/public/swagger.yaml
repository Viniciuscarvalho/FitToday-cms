  /api/admin/subscriptions:
    get:
      tags: [Admin]
      summary: List all trainer subscriptions
      description: Admin-only. Returns trainers with their plan info and calculates MRR.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscription overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  trainers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        email:
                          type: string
                        plan:
                          type: string
                          enum: [starter, pro, elite]
                        subscriptionStatus:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                          nullable: true
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      starter:
                        type: integer
                      pro:
                        type: integer
                      elite:
                        type: integer
                      pastDue:
                        type: integer
                      mrrCents:
                        type: integer
                        description: Monthly Recurring Revenue in cents (BRL)
        "401":
          description: Unauthorized (admin only)

  /api/admin/metrics:
    get:
      tags: [Admin]
      summary: Get platform metrics
